<html>
<head>
	<style>
        .header
		{
            text-align: center;
            animation: blink-animation 4s steps(5,start) infinite;
            -webkit-animation: blink-animation 4s steps(5,start) infinite;
        }

        @keyframes blink-animation
		{
            to {
                visibility: hidden;
            }
        }

        @-webkit-keyframes blink-animation 
		{
            to {
                visibility: hidden;
            }
        }
		option{
			font-family:courier;
			font-weight:bold:
		}
	</style>
</head>
<body>
	<header>
		<div class="header">
			<h1>Display Capital</h1>
		</div>
		<center>
			<div class="container">

				<p>Select Country :</p>
				<select name="" id="country" onchange="showCapital()">
					<option value=""> SELECT COUNTRY </option>

					<option value="Delhi">India</option>
					<option value="Kiev">Ukraine</option>
					<option value="Paris">France</option>
					<option value="Berlin">Germany</option>
					<option value="London">UK</option>
				</select>

				<p id="capital" style="color:palevioletred"></p>

			</div>

			<script>
				function showCapital()
				{
					var country = document.getElementById("country");
					var capital = document.getElementById("capital");

					if (country.value == "")
						capital.innerText = "";

					else
						capital.innerText = "Capital :" + country.value;
				}
			</script>
		</center>
</body>
</html>

<!DOCTYPE html>
<html>
	<head>	
		<meta  charset="utf-8">
		<title>Assignment 2 Ex 3</title>
		<style>
			#box{
				border:1px solid black;
				width:500px;
				height:200px;
			}
			#image{
				border:1px solid blue;
				width:300px;
				height:150px;
				margin:10px;
			}
		</style>
	</head>
	
	<body>
		<div id="box" ondrop="drop(event)" ondragover="allowDrop(event)">
		</div>

		<img src="ssc.png" id="image" draggable="true" ondragstart="drag(event)"/>

		<script>
			function allowDrop(event){
				event.preventDefault();
			}
			function drop(event){
				event.target.appendChild(document.getElementById("image"));
			}
			function drag(event){
				event.dataTransfer.setData("text",event.target.id);
			}
		</script>
	</body>
</html>

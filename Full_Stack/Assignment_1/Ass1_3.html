<html>
<body>
	<svg height="100" width="100">
		<polygon points="50,15  90,85 10,35 90,35 10,85" style="fill:lightblue; stroke:gray;">
	</svg>

	<br><br>
	<video controls  width="100" height="50" > 
		<source src="example.mp4" type="video/mp4">
        </video><br><br>
	
		<audio controls> 
		<source src="example.mp3" type="audio/mp3">
        </audio><br><br>

    
		<button id="LocationBtn" onclick="getLocation()">Where Am I ?</button>

		<p id="loc"></p>
 	
	<script>
		function getLocation()
		{
		    var loc=document.getElementById("loc");
			if(navigator.geolocation)
			{
				navigator.geolocation.getCurrentPosition(showLocation);	
			}
			else
			{
				document.getElementById("loc").textContent ="GeoLocation Not Supported";			
			}
		}
		function showLocation(position)
		{	
		    	document.getElementById("loc").textContent ="Latitude :" + position.coords.latitude + "Longitude :" + position.coords.longitude;
		}
	</script><br><br>
	
      </body>
</html>
